# 毎日 02:00 JST（17:00 UTC）に Kickstarter をクロールし、
# Claude で日本語翻訳 → Supabase 同期 → main へ push → Netlify 自動デプロイ
name: Daily Crawl

on:
  schedule:
    # 02:00 Asia/Tokyo = 17:00 UTC
    - cron: "0 17 * * *"
  workflow_dispatch:

concurrency:
  group: daily-crawl
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  crawl-translate-sync-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright Chromium
        run: python3 -m playwright install chromium --with-deps

      - name: Crawl, translate, and sync to Supabase
        run: |
          python3 scripts/run_crawl.py \
            --replace \
            --force-translate \
            --ks-pages 20 \
            --min 50 \
            --kickstarter-only \
            --fail-on-sync-error

      - name: Commit crawl snapshot and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/projects_merged.json
          if git diff --staged --quiet; then
            echo "No changes in projects_merged.json"
          else
            git commit -m "chore: daily crawl $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Trigger Netlify build hook
        if: env.NETLIFY_BUILD_HOOK_URL != ''
        run: curl -sS -X POST -d {} "$NETLIFY_BUILD_HOOK_URL"
